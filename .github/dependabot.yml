version: 2
updates:
  # GitHub Actions — pinned versions in workflow files
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']

  # pnpm workspace — single entry at root so Dependabot updates the shared
  # pnpm-lock.yaml. Per-workspace entries leave the root lockfile stale and
  # break CI with ERR_PNPM_OUTDATED_LOCKFILE.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # chat-web is pinned to eslint 9 because eslint-config-next 16.x pulls a
    # bundled babel-eslint-parser and eslint-plugin-react 7.x that both break
    # under eslint 10. Revisit when the Next.js eslint ecosystem catches up.
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
    groups:
      aws-cdk:
        patterns: ['aws-cdk*', 'cdk*', 'constructs']
      aws-sdk:
        patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
      aws-amplify:
        patterns: ['aws-amplify', '@aws-amplify/*']
      next:
        patterns: ['next', 'react', 'react-dom', '@types/react*']
      tooling:
        patterns: ['*']
        exclude-patterns:
          - 'aws-cdk*'
          - 'cdk*'
          - 'constructs'
          - '@aws-sdk/*'
          - '@aws-lambda-powertools/*'
          - 'aws-amplify'
          - '@aws-amplify/*'
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react*'
        update-types: [minor, patch]
