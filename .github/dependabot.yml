version: 2
updates:
  # GitHub Actions — pinned versions in workflow files
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']

  # Root workspace (prettier, shared tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      root:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /infrastructure
    schedule:
      interval: weekly
      day: monday
    groups:
      aws-cdk:
        patterns: ['aws-cdk*', 'cdk*', 'constructs']
      tooling:
        patterns: ['*']
        exclude-patterns: ['aws-cdk*', 'cdk*', 'constructs']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /services/guardian-poc
    schedule:
      interval: weekly
      day: monday
    groups:
      aws-sdk:
        patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
      tooling:
        patterns: ['*']
        exclude-patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /services/bedrock-guardrails-poc
    schedule:
      interval: weekly
      day: monday
    groups:
      aws-sdk:
        patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
      tooling:
        patterns: ['*']
        exclude-patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /services/no-guardrails-poc
    schedule:
      interval: weekly
      day: monday
    groups:
      aws-sdk:
        patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
      tooling:
        patterns: ['*']
        exclude-patterns: ['@aws-sdk/*', '@aws-lambda-powertools/*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /services/chat-web
    schedule:
      interval: weekly
      day: monday
    groups:
      next:
        patterns: ['next', 'react', 'react-dom', '@types/react*']
      aws-amplify:
        patterns: ['aws-amplify', '@aws-amplify/*']
      tooling:
        patterns: ['*']
        exclude-patterns:
          ['next', 'react', 'react-dom', '@types/react*', 'aws-amplify', '@aws-amplify/*']
        update-types: [minor, patch]
